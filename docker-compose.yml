version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mantys}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mantys}
      POSTGRES_DB: ${POSTGRES_DB:-mantys_kanban}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-mantys}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mantys-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mantys}:${POSTGRES_PASSWORD:-mantys}@postgres:5432/${POSTGRES_DB:-mantys_kanban}
      PORT: '3000'
      WEB_URL: ${WEB_URL:-http://localhost:3001}
    networks:
      - mantys-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    ports:
      - '3001:3001'
    depends_on:
      - api
    networks:
      - mantys-network

volumes:
  postgres_data:

networks:
  mantys-network:
    driver: bridge
