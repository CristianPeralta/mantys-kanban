version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mantys}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mantys}
      POSTGRES_DB: ${POSTGRES_DB:-mantys_kanban}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-mantys}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mantys-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - mantys-network

volumes:
  postgres_data:

networks:
  mantys-network:
    driver: bridge
